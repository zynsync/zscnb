<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>来自𝙕𝙮𝙣𝙎𝙮𝙣𝙘的一封信</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: 
                linear-gradient(160deg, #e8e4d9 0%, #d8d4c8 100%),
                radial-gradient(circle at 20% 80%, rgba(200,195,185,0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(190,185,170,0.6) 0%, transparent 40%);
            font-family: "Microsoft YaHei", "Noto Serif SC", serif;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-tap-highlight-color: transparent;
        }

        .paper-container {
            width: 100%;
            max-width: 860px;
            position: relative;
        }

        .decorative-branch {
            position: absolute;
            top: -15px;
            left: -20px;
            font-size: 80px;
            opacity: 0.15;
            transform: rotate(-25deg);
            z-index: 0;
        }

        .decorative-flower {
            position: absolute;
            top: 30px;
            right: -30px;
            font-size: 60px;
            opacity: 0.12;
            transform: rotate(15deg);
            z-index: 0;
        }

        .letter-paper {
            background: #f5f2e8;
            padding: 55px 50px 70px;
            border-radius: 4px;
            box-shadow: 
                0 4px 20px rgba(0,0,0,0.08),
                inset 0 0 80px rgba(140,130,115,0.06);
            position: relative;
        }

        .letter-paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    transparent,
                    transparent 29px,
                    #c9c4b8 29px,
                    #c9c4b8 30px
                );
            pointer-events: none;
            opacity: 0.5;
        }

        .paper-header {
            text-align: center;
            margin-bottom: 45px;
            position: relative;
            z-index: 1;
        }

        .date-line {
            font-size: 13px;
            color: #8b7355;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: "Courier New", monospace;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #4a4035;
            letter-spacing: 8px;
            user-select: none;
        }

        .title-sub {
            font-size: 15px;
            color: #6b5b4f;
            margin-top: 5px;
            font-style: italic;
            letter-spacing: 3px;
        }

        .stamp-mark {
            position: absolute;
            top: 45px;
            right: 45px;
            width: 70px;
            height: 85px;
            border: 2px solid #8b7355;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #6b5b4f;
            transform: rotate(8deg);
            opacity: 0.8;
            z-index: 2;
        }

        .stamp-mark::before {
            content: 'ZSC';
            font-weight: bold;
            letter-spacing: 1px;
            font-family: "Courier New", monospace;
        }

        .lang-switch-area {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px;
            position: relative;
            z-index: 2;
        }

        .lang-btn {
            background: rgba(139,115,85,0.08);
            border: 1px solid #a0907e;
            color: #4a4035;
            padding: 6px 22px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(2px);
            letter-spacing: 0.5px;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .lang-btn:hover {
            background: rgba(139,115,85,0.18);
            color: #2c241e;
        }

        .nav-links-envelope {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 25px 0 20px;
            border-top: 1px dashed #b8ae9c;
            border-bottom: 1px dashed #b8ae9c;
            padding: 15px 0;
            position: relative;
            z-index: 2;
        }

        .nav-links-envelope a {
            color: #5a4a3a;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            transition: color 0.2s;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .nav-links-envelope a:hover {
            color: #2c241e;
            text-decoration: underline wavy #a0907e 1px;
            text-underline-offset: 5px;
        }

        .section-tag-envelope {
            font-size: 13px;
            color: #8b7355;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .section-title-envelope {
            font-size: 26px;
            font-weight: bold;
            color: #3d382f;
            margin-bottom: 20px;
            letter-spacing: 3px;
            border-left: 5px solid #a0907e;
            padding-left: 20px;
        }

        .project-entry {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 45px;
            position: relative;
            z-index: 2;
            border-bottom: 1px dotted #c9c0b2;
            padding-bottom: 35px;
        }

        .project-entry.reverse {
            flex-direction: row-reverse;
        }

        .project-text {
            flex: 1;
        }

        .project-name {
            font-size: 22px;
            font-weight: 700;
            color: #3d382f;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .project-desc {
            font-size: 15px;
            color: #5f5547;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .project-tags-env {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .tag-env {
            background: rgba(160,144,126,0.12);
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #5a4a3a;
            border: 1px solid #c4b9a9;
        }

        .project-link-env {
            color: #6b5b4f;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1.5px solid #b8ae9c;
            padding-bottom: 3px;
            transition: all 0.2s;
        }

        .project-link-env i {
            font-size: 13px;
        }

        .project-link-env:hover {
            color: #2c241e;
            border-bottom-color: #5a4a3a;
        }

        .project-visual-env {
            flex: 0.8;
            min-width: 160px;
            height: 140px;
            background: #e3ddd0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(160,144,126,0.2), 3px 3px 8px rgba(0,0,0,0.05);
            color: #7a6b5a;
            font-size: 46px;
            border: 1px solid #d1c7b8;
        }

        .sponsor-env-section {
            margin-top: 50px;
            text-align: center;
            padding: 30px 20px;
            background: rgba(200,190,175,0.15);
            border-radius: 6px;
            position: relative;
            z-index: 2;
        }

        .sponsor-btn-env {
            display: inline-block;
            background: #8b7355;
            color: #f5f2e8;
            padding: 12px 36px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 20px;
            border: 1px solid #6b5b4f;
            transition: 0.2s;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .sponsor-btn-env i {
            margin-right: 8px;
        }

        .sponsor-btn-env:hover {
            background: #6b5b4f;
        }

        .footer-env {
            margin-top: 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-top: 25px;
            border-top: 1px solid #b8ae9c;
            font-size: 13px;
            color: #5f5547;
            position: relative;
            z-index: 2;
        }

        .footer-links-env a {
            color: #5a4a3a;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-socials-env a {
            color: #6b5b4f;
            margin: 0 6px;
            font-size: 16px;
        }

        .filter-chips-env {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 35px;
            position: relative;
            z-index: 2;
        }

        .filter-chip-env {
            background: transparent;
            border: 1px solid #a0907e;
            color: #4a4035;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .filter-chip-env.active {
            background: #8b7355;
            color: #f5f2e8;
            border-color: #8b7355;
        }

        .white-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0ece1;
            z-index: 10000;
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .white-overlay.active {
            transform: scale(1);
            pointer-events: auto;
        }

        @media (max-width: 700px) {
            .letter-paper {
                padding: 40px 25px 55px;
            }
            .project-entry, .project-entry.reverse {
                flex-direction: column;
                gap: 15px;
            }
            .project-visual-env {
                width: 100%;
                min-width: auto;
            }
            .nav-links-envelope {
                gap: 18px;
                flex-wrap: wrap;
            }
            .stamp-mark {
                width: 55px;
                height: 70px;
                font-size: 10px;
                top: 35px;
                right: 25px;
            }
            .title {
                font-size: 26px;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="white-overlay" id="whiteOverlay"></div>
    <div class="paper-container">
        <div class="decorative-branch">🌿</div>
        <div class="decorative-flower">✿</div>
        
        <div class="letter-paper">
            <div class="paper-header">
                <div class="date-line" id="currentDate"></div>
                <div class="title">- 𝙕𝙮𝙣𝙎𝙮𝙣𝙘 -</div>
                <div class="title-sub" data-i18n="heroSubtitle">我的个人官网</div>
            </div>
            
            <div class="lang-switch-area">
                <span class="lang-btn" id="langToggle" data-i18n="langBtn">🌐 中 / EN</span>
                
            </div>
            

            <nav class="nav-links-envelope">
                <a href="#" data-section="hero" data-i18n="navHome">首页</a>
                <a href="#" data-section="projects" data-i18n="navProjects">项目</a>
                <a href="#" data-section="sponsor" data-i18n="navSponsor">赞助</a>
                <a href="#" data-section="footer" data-i18n="navInfo">信息</a>
            </nav>
            

            <div id="heroSection" style="margin: 25px 0 30px; position: relative; z-index: 2;">
                <p style="font-size: 16px; color: #3d382f; text-indent: 2em; line-height: 1.8;" data-i18n="heroDesc">以科技之名，创造无限可能。探索每一个精心打造的项目，感受代码与设计的温度。</p>
            </div>

            <div id="projectsSection">
                <div class="section-tag-envelope" data-i18n="projectsTag">项目精选</div>
                <h2 class="section-title-envelope" data-i18n="projectsTitle">项目列表</h2>
                <div class="filter-chips-env" id="filterContainer">
                    <span class="filter-chip-env active" data-filter="all" data-i18n="filterAll">全部</span>
                    <span class="filter-chip-env" data-filter="games" data-i18n="filterGames">游戏</span>
                    <span class="filter-chip-env" data-filter="tools" data-i18n="filterTools">工具</span>
                    <span class="filter-chip-env" data-filter="community" data-i18n="filterCommunity">社区</span>
                </div>
                <div id="projectsList"></div>
            </div>

            <div id="sponsorSection" class="sponsor-env-section">
                <div class="section-tag-envelope" data-i18n="sponsorPill">支持我们</div>
                <h2 class="section-title-envelope" style="border-left: none; text-align: center; padding-left: 0;" data-i18n="sponsorTitle">支持我们</h2>
                <p style="max-width: 500px; margin: 0 auto 15px; color: #4a4035;" data-i18n="sponsorDesc">您的支持将帮助我们持续开发创新项目，推动技术边界，为用户带来更好的数字体验。</p>
                <a href="https://zynsync.github.io/VIPzanzhu" target="_blank" class="sponsor-btn-env" id="sponsorBtn"><i class="fas fa-crown"></i><span data-i18n="sponsorBtn">前往赞助页面</span></a>
            </div>

            <div class="footer-env" id="footerSection">
                <div>
                    <span>© 2026 - 𝙕𝙮𝙣𝙎𝙮𝙣𝙘 -</span>
                    <span style="margin-left: 15px;" data-i18n="qqGroup">加入QQ交流群: 1070356813</span>
                </div>
                <div class="footer-links-env">
                    <a href="https://zynsync.github.io/com" target="_blank" data-i18n="linkNewSite">全新官网</a>
                    <a href="https://zynsync.github.io/dos" target="_blank" data-i18n="linkDontClick">不要点我😋</a>
                    <a href="#" data-i18n="linkPrivacy">隐私政策</a>
                </div>
                <div class="footer-socials-env">
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-discord"></i></a>
                </div>
            </div>

            <div class="stamp-mark"></div>
        </div>
    </div>

    <script>
        (function(){
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            document.getElementById('currentDate').innerText = `${y}年${m}月${d}日`;

            const overlay = document.getElementById('whiteOverlay');
            let isAnimating = false;

            function handleLinkClick(e) {
                const link = e.target.closest('a');
                if (!link) return;
                const href = link.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('javascript:')) return;
                e.preventDefault();
                if (isAnimating) return;
                isAnimating = true;
                overlay.classList.add('active');
                const targetHref = href;
                const openInNew = link.target === '_blank';
                overlay.addEventListener('transitionend', function onTransitionEnd() {
                    overlay.removeEventListener('transitionend', onTransitionEnd);
                    if (openInNew) {
                        window.open(targetHref, '_blank');
                        setTimeout(() => {
                            overlay.classList.remove('active');
                            isAnimating = false;
                        }, 100);
                    } else {
                        window.location.href = targetHref;
                    }
                }, { once: true });
            }
            document.addEventListener('click', handleLinkClick);

            const projectsData = [
                { name: '美观的AI丨API调用', nameEn: 'Beautiful API Hub', desc: '自带公益无限免费API · 界面美观仿deepseek', descEn: 'Public free API · Elegant interface', icon: 'fa-cloud-sun', category: 'tools', link: 'https://zynsync.github.io/apiuse', tags: ['工具','API','公益'], tagsEn: ['Tools','API','Free'] },
                { name: 'ZSC魔方模拟器', nameEn: 'ZSC Cube Simulator', desc: '3D魔方模拟与求解器，支持多种魔方类型', descEn: '3D cube simulator & solver, multiple cube types', icon: 'fa-cube', category: 'games', link: 'https://zynsync.github.io/mofang', tags: ['游戏','3D','解谜'], tagsEn: ['Games','3D','Puzzle'] },
                { name: 'ZSC AI助手', nameEn: 'ZSC AI Assistant', desc: '智能对话与创作，无限免费使用', descEn: 'Smart conversation & creation, free forever', icon: 'fa-robot', category: 'tools', link: 'https://zynsync.github.io/AI/', tags: ['工具','AI','对话'], tagsEn: ['Tools','AI','Chat'] },
                { name: 'ZSC 设备性能测试', nameEn: 'ZSC Device Benchmark', desc: '专业测试设备性能，揭示性能差别', descEn: 'Professional performance testing', icon: 'fa-mountain', category: 'tools', link: 'https://zynsync.github.io/dumogu/', tags: ['工具','性能测试','基准测试'], tagsEn: ['Tools','Benchmark','Bench'] },
                { name: 'ZSC 消息加密工具', nameEn: 'ZSC Message Encryption', desc: '安全加密与解密，与好友安全传递消息', descEn: 'Secure encryption & decryption', icon: 'fa-lock', category: 'tools', link: 'https://zynsync.github.io/jiami', tags: ['工具','安全','消息加密'], tagsEn: ['Tools','Security','Encrypt'] },
                { name: 'ZSC 极致html加密', nameEn: 'Ultimate HTML Encryption', desc: '几乎无法破译的代码加密，可正常运行', descEn: 'Almost unbreakable code encryption', icon: 'fa-shield-halved', category: 'tools', link: 'https://zynsync.github.io/codejm', tags: ['工具','安全','加密'], tagsEn: ['Tools','Security','Encrypt'] },
                { name: 'ZSC 安卓源码整合', nameEn: 'Android Source Merger', desc: '上传安卓项目，自动解析整合源代码', descEn: 'Upload Android project, auto merge', icon: 'fa-code', category: 'tools', link: 'https://zynsync.github.io/code-zh', tags: ['工具','编程','教育'], tagsEn: ['Tools','Programming','Education'] },
                { name: '- 𝙕𝙮𝙣𝙎𝙮𝙣𝙘 -交流群', nameEn: 'Community', desc: '与开发者直接交流，获取最新动态', descEn: 'Chat with devs, get latest updates', icon: 'fa-users', category: 'community', link: 'https://zynsync.github.io/QQ', tags: ['社区','交流','技术支持'], tagsEn: ['Community','Chat','Support'] }
            ];

            let currentLang = 'zh';
            const projectsContainer = document.getElementById('projectsList');

            function renderProjects(filter = 'all') {
                let html = '';
                projectsData.forEach((proj, index) => {
                    if (filter !== 'all' && proj.category !== filter) return;
                    const isReverse = index % 2 === 1;
                    const name = currentLang === 'zh' ? proj.name : proj.nameEn;
                    const desc = currentLang === 'zh' ? proj.desc : proj.descEn;
                    const tags = currentLang === 'zh' ? proj.tags : proj.tagsEn;
                    html += `<div class="project-entry ${isReverse ? 'reverse' : ''}" data-category="${proj.category}">
                        <div class="project-text">
                            <div class="project-name">${name}</div>
                            <div class="project-desc">${desc}</div>
                            <div class="project-tags-env">
                                ${tags.map(t => `<span class="tag-env">${t}</span>`).join('')}
                            </div>
                            <a href="${proj.link}" target="_blank" class="project-link-env" data-i18n="viewProject">${currentLang === 'zh' ? '查看项目' : 'View Project'} <i class="fas fa-arrow-right"></i></a>
                        </div>
                        <div class="project-visual-env">
                            <i class="fas ${proj.icon}" style="font-size: 52px; opacity: 0.8;"></i>
                        </div>
                    </div>`;
                });
                projectsContainer.innerHTML = html;
            }

            const translations = {
                zh: {
                    navHome: '首页', navProjects: '项目', navSponsor: '赞助', navInfo: '信息',
                    heroSubtitle: '我的个人官网', langBtn: '🌐 中 / EN',
                    heroDesc: '以科技之名，创造无限可能。探索每一个精心打造的项目，感受代码与设计的温度。',
                    projectsTag: '项目精选', projectsTitle: '项目列表',
                    filterAll: '全部', filterGames: '游戏', filterTools: '工具', filterCommunity: '社区',
                    sponsorPill: '支持我们', sponsorTitle: '支持我们', sponsorDesc: '您的支持将帮助我们持续开发创新项目，推动技术边界，为用户带来更好的数字体验。',
                    sponsorBtn: '前往赞助页面',
                    viewProject: '查看项目',
                    qqGroup: '加入QQ交流群: 1070356813',
                    linkNewSite: '全新官网', linkDontClick: '不要点我😋', linkPrivacy: '隐私政策'
                },
                en: {
                    navHome: 'Home', navProjects: 'Projects', navSponsor: 'Sponsor', navInfo: 'Info',
                    heroSubtitle: 'My Personal Website', langBtn: '🌐 EN / 中',
                    heroDesc: 'In the name of tech, create infinite possibilities. Explore every crafted project.',
                    projectsTag: 'Featured Projects', projectsTitle: 'Projects',
                    filterAll: 'All', filterGames: 'Games', filterTools: 'Tools', filterCommunity: 'Community',
                    sponsorPill: 'Support Us', sponsorTitle: 'Support Us', sponsorDesc: 'Your support helps us innovate and deliver better digital experiences.',
                    sponsorBtn: 'Go to Sponsor Page',
                    viewProject: 'View Project',
                    qqGroup: 'QQ Group: 1070356813',
                    linkNewSite: 'New Site', linkDontClick: 'Don\'t click😋', linkPrivacy: 'Privacy'
                }
            };

            function applyLanguage(lang) {
                currentLang = lang;
                const dict = translations[lang];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (dict[key]) el.innerText = dict[key];
                });
                document.getElementById('langToggle').innerText = dict['langBtn'];
                const activeFilter = document.querySelector('.filter-chip-env.active')?.dataset.filter || 'all';
                renderProjects(activeFilter);
            }

            document.getElementById('langToggle').addEventListener('click', () => {
                const newLang = currentLang === 'zh' ? 'en' : 'zh';
                applyLanguage(newLang);
            });

            const filterChips = document.querySelectorAll('.filter-chip-env');
            filterChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    filterChips.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    renderProjects(this.dataset.filter);
                });
            });

            renderProjects('all');
            applyLanguage('zh');

            const navLinks = document.querySelectorAll('.nav-links-envelope a');
            navLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = link.dataset.section;
                    if (section === 'hero') window.scrollTo({ top: 0, behavior: 'smooth' });
                    else if (section === 'projects') document.getElementById('projectsSection').scrollIntoView({ behavior: 'smooth' });
                    else if (section === 'sponsor') document.getElementById('sponsorSection').scrollIntoView({ behavior: 'smooth' });
                    else if (section === 'footer') document.getElementById('footerSection').scrollIntoView({ behavior: 'smooth' });
                });
            });
        })();
    </script>
</body>
</html>

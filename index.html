<!doctype html>
<html data-theme="garden" data-theme-type="light" lang="zh" style="background-color: oklch(var(--b2))">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Zynsync's Blog</title>
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <meta name="msapplication-TileImage" content="logo.png">
    <meta name="msapplication-TileColor" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@400;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --rounded-box: 1rem;
            --rounded-btn: 0.5rem;
            --rounded-badge: 1.9rem;
            --animation-btn: 0.25s;
            --animation-input: 0.2s;
            --btn-focus-scale: 0.95;
            --border-btn: 1px;
            --tab-border: 1px;
            --tab-radius: 0.5rem;
            --p: 49.12% 0.3096 275.75;
            --s: 69.71% 0.329 342.55;
            --a: 76.76% 0.184 183.61;
            --n: 32.1785% 0.02476 255.701624;
            --b1: 100% 0 0;
            --b2: 96.1151% 0 0;
            --b3: 92.4169% 0.00108 197.137559;
            --bc: 27.8078% 0.029596 256.847952;
            --in: 72.06% 0.191 231.6;
            --su: 64.8% 0.15 160;
            --wa: 84.71% 0.199 83.87;
            --er: 71.76% 0.221 22.18;
            --pc: 89.824% 0.06192 275.75;
            --sc: 98.71% 0.0106 342.55;
            --ac: 15.352% 0.0368 183.61;
            --nc: 89.4994% 0.011585 252.096176;
            --inc: 0% 0 0;
            --suc: 0% 0 0;
            --wac: 0% 0 0;
            --erc: 0% 0 0;
            --custom-page-bg: oklch(var(--b2));
            --banner-wave-bg: oklch(var(--b2));
            --neu-base: oklch(var(--b1));
            --neu-text: oklch(var(--bc));
            --neu-accent: oklch(var(--p));
            --neu-border: oklch(var(--bc) / 0.1);
            --neu-btn-text: oklch(var(--bc));
            --neu-btn-bg: oklch(var(--b2));
            --neu-text-muted: oklch(var(--bc) / 0.6);
            --shadow-neu-out: 8px 8px 16px 0 rgba(0, 0, 0, 0.05), -8px -8px 16px 0 rgba(255, 255, 255, 0.6);
            --shadow-neu-in: inset 8px 8px 16px 0 rgba(0, 0, 0, 0.05), inset -8px -8px 16px 0 rgba(255, 255, 255, 0.6);
        }

        [data-theme-type="dark"] {
            --shadow-neu-out: 8px 8px 16px 0 rgba(0, 0, 0, 0.4), -8px -8px 16px 0 rgba(255, 255, 255, 0.02);
            --shadow-neu-in: inset 8px 8px 16px 0 rgba(0, 0, 0, 0.4), inset -8px -8px 16px 0 rgba(255, 255, 255, 0.02);
        }

        *,
        ::before,
        ::after {
            box-sizing: border-box;
            border-width: 0;
            border-style: solid;
            border-color: #e5e7eb;
            --tw-border-spacing-x: 0;
            --tw-border-spacing-y: 0;
            --tw-translate-x: 0;
            --tw-translate-y: 0;
            --tw-rotate: 0;
            --tw-skew-x: 0;
            --tw-skew-y: 0;
            --tw-scale-x: 1;
            --tw-scale-y: 1;
            --tw-scroll-snap-strictness: proximity;
            --tw-ring-offset-width: 0px;
            --tw-ring-offset-color: #fff;
            --tw-ring-color: rgb(59 130 246 / 0.5);
            --tw-ring-offset-shadow: 0 0 #0000;
            --tw-ring-shadow: 0 0 #0000;
            --tw-shadow: 0 0 #0000;
            --tw-shadow-colored: 0 0 #0000;
        }

        html {
            line-height: 1.5;
            -webkit-text-size-adjust: 100%;
            tab-size: 4;
            font-family: "M PLUS Rounded 1c", Nunito, "Noto Sans SC", sans-serif;
            scroll-behavior: smooth;
            background-color: var(--custom-page-bg);
            height: 100%;
            overflow-x: hidden;
        }
        html.theme-transition,
        html.theme-transition *,
        html.theme-transition *::before,
        html.theme-transition *::after {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, fill 0.4s ease, stroke 0.4s ease !important;
        }

        body {
            margin: 0;
            line-height: inherit;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--banner-wave-bg);
            font-weight: 400;
            overflow-x: hidden;
            width: 100%;
        }

        a {
            color: inherit;
            text-decoration: inherit;
        }
        img, svg, video, canvas, audio, iframe, embed, object {
            display: block;
            vertical-align: middle;
        }
        img, video {
            max-width: 100%;
            height: auto;
        }
        button, [role="button"] {
            cursor: pointer;
        }
        :disabled {
            cursor: default;
        }
        h1, h2, h3, h4, h5, h6 {
            font-size: inherit;
            font-weight: inherit;
            margin: 0;
        }
        p {
            margin: 0;
        }
        ul, ol {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .banner {
            position: relative;
            height: 40vh;
            overflow: hidden;
        }
        @media (min-width: 768px) {
            .banner {
                height: 60vh;
            }
        }
        .banner-inner {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .banner-bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s;
        }
        .banner-overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 10;
        }
        .banner-content {
            position: relative;
            z-index: 20;
            height: 95%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            width: 100%;
        }
        .banner-text {
            text-align: center;
            color: white;
            width: 80%;
        }
        @media (min-width: 1024px) {
            .banner-text {
                width: 75%;
            }
        }
        .title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2.25rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        @media (min-width: 768px) {
            .title {
                font-size: 3.75rem;
            }
        }
        @media (min-width: 1024px) {
            .title {
                font-size: 6rem;
            }
        }
        .subtitle {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 1.25rem;
            margin-top: 0.5rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.4);
            min-height: 2.5rem;
        }
        @media (min-width: 768px) {
            .subtitle {
                font-size: 1.5rem;
            }
        }
        @media (min-width: 1024px) {
            .subtitle {
                font-size: 2.25rem;
            }
        }
        .waves {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 10vh;
            max-height: 9.375rem;
            min-height: 3.125rem;
            z-index: 10;
        }
        @media (min-width: 768px) {
            .waves {
                height: 15vh;
            }
        }
        .parallax use {
            fill: var(--banner-wave-bg);
            animation: wave 25s cubic-bezier(0.5, 0.5, 0.45, 0.5) infinite;
        }
        @keyframes wave {
            0% { transform: translate3d(-90px, 0, 0); }
            100% { transform: translate3d(85px, 0, 0); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 0.5rem 1rem;
            transition: opacity 0.5s, transform 0.5s;
        }
        .navbar-hidden {
            opacity: 0;
            pointer-events: none;
        }
        .nav-container {
            max-width: 72rem;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 9999px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        [data-theme-type="dark"] .nav-container {
            background-color: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: oklch(var(--p));
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.15rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 0.75rem;
            font-weight: 600;
            color: oklch(var(--bc));
            transition: all 0.2s;
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }
        .nav-item:hover {
            background-color: rgba(255,255,255,0.1);
            color: oklch(var(--p));
        }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 9999px;
            background: transparent;
            border: none;
            color: oklch(var(--p));
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .dropdown {
            position: relative;
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
            padding: 0.5rem;
            min-width: 12rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            z-index: 100;
            max-height: 24rem;
            overflow-y: auto;
        }
        [data-theme-type="dark"] .dropdown-menu {
            background-color: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        }
        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: oklch(var(--bc));
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .dropdown-item:hover {
            background-color: oklch(var(--b3));
        }
        .theme-dot {
            width: 1rem;
            height: 1rem;
            border-radius: 9999px;
            border: 1px solid oklch(var(--bc) / 0.2);
        }

        .page-content {
            flex-grow: 1;
            max-width: 72rem;
            width: 100%;
            margin: 2rem auto 0;
            padding: 0 1rem 5rem 1rem;
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            padding-bottom: 1rem;
        }
        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr 240px;
            }
        }
        @media (min-width: 1024px) {
            .grid-layout {
                grid-template-columns: 1fr 280px;
            }
        }

        .card {
            background-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: all 0.3s;
        }
        [data-theme-type="dark"] .card {
            background-color: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }
        [data-theme-type="dark"] .card:hover {
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .post-card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        @media (min-width: 1024px) {
            .post-card {
                flex-direction: row;
                align-items: stretch;
            }
        }
        .post-image {
            aspect-ratio: 16/9;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 1024px) {
            .post-image {
                width: 40%;
                aspect-ratio: auto;
            }
        }
        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s;
        }
        .post-card:hover .post-image img {
            transform: scale(1.1);
        }
        .post-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .post-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, oklch(var(--p)), oklch(var(--s)));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.2s;
        }
        .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            font-size: 0.875rem;
            color: oklch(var(--bc) / 0.7);
            margin: 0.75rem 0;
        }
        .post-desc {
            font-size: 0.875rem;
            color: oklch(var(--bc) / 0.7);
            margin-bottom: 1rem;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .tag {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: oklch(var(--s) / 0.1);
            color: oklch(var(--s));
            transition: all 0.2s;
        }
        .tag:hover {
            background-color: oklch(var(--s));
            color: oklch(var(--sc));
        }
        .category-tag {
            background-color: oklch(var(--p) / 0.1);
            color: oklch(var(--p));
        }
        .category-tag:hover {
            background-color: oklch(var(--p));
            color: oklch(var(--pc));
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .profile-card {
            padding: 1rem;
            text-align: center;
        }
        .profile-img {
            width: 6rem;
            height: 6rem;
            border-radius: 9999px;
            margin: 0 auto 1rem;
            overflow: hidden;
        }
        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid oklch(var(--bc) / 0.2);
            margin-top: 1rem;
            padding-top: 1rem;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.125rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.75rem;
            color: oklch(var(--bc) / 0.5);
        }

        .section-title {
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 0.75rem;
            padding-left: 1rem;
            position: relative;
        }
        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 4px;
            background-color: oklch(var(--p));
            border-radius: 4px;
        }

        .footer {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 9999px;
            padding: 1.5rem;
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            align-items: center;
        }
        [data-theme-type="dark"] .footer {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--rounded-btn);
            padding: 0.5rem 1rem;
            font-weight: 600;
            transition: all 0.2s;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: oklch(var(--bc));
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        [data-theme-type="dark"] .btn {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-primary {
            background-color: oklch(var(--p));
            color: oklch(var(--pc));
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }
        .page-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-weight: 600;
        }
        [data-theme-type="dark"] .page-link {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .page-link.active {
            background-color: oklch(var(--p));
            color: oklch(var(--pc));
        }

        .hidden {
            display: none !important;
        }
        .opacity-0 {
            opacity: 0;
        }
        .text-center {
            text-align: center;
        }
        .mt-2 {
            margin-top: 0.5rem;
        }
        .mb-4 {
            margin-bottom: 1rem;
        }
        .gap-2 {
            gap: 0.5rem;
        }
        .flex {
            display: flex;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .w-full {
            width: 100%;
        }
        .h-5 {
            height: 1.25rem;
            width: 1.25rem;
        }
        .text-sm {
            font-size: 0.875rem;
        }
        .font-bold {
            font-weight: 700;
        }
        .rounded-full {
            border-radius: 9999px;
        }
        .p-2 {
            padding: 0.5rem;
        }
        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }
        .search-wrap {
            padding: 1rem;
        }
        .input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: oklch(var(--bc));
            font-family: inherit;
            font-size: 0.875rem;
        }
        [data-theme-type="dark"] .input {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .relative {
            position: relative;
        }
        .absolute {
            position: absolute;
        }
        .left-3 {
            left: 0.75rem;
        }
        .top-2 {
            top: 0.5rem;
        }
        .pointer-events-none {
            pointer-events: none;
        }
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        @media (max-width: 767px) {
            .nav-links {

            function applyTheme(themeName, withTransition) {
                var palette = themePalettes[themeName];
                if (!palette) { applyTheme('garden', withTransition); return; }

                if (withTransition) {
                    document.documentElement.classList.add('theme-transition');
                    setTimeout(function() {
                        document.documentElement.classList.remove('theme-transition');
                    }, 450);
                }

                document.documentElement.setAttribute('data-theme', themeName);
                document.documentElement.setAttribute('data-theme-type', palette.type);

                var root = document.documentElement;
                var vars = palette.vars;
                Object.keys(vars).forEach(function(key) {
                    root.style.setProperty(key, vars[key]);
                });

                updateThemeIcons(palette.type === 'dark');
                localStorage.setItem('theme', themeName);
                if (palette.type === 'light') {
                    localStorage.setItem('lightTheme', themeName);
                } else {
                    localStorage.setItem('darkTheme', themeName);
                }
                updateMenuActiveState(themeName);
            }

            function updateThemeIcons(isDark) {
                var lightIcon = document.getElementById('icon-light');
                var darkIcon = document.getElementById('icon-dark');
                if (lightIcon && darkIcon) {
                    if (isDark) {
                        lightIcon.classList.add('hidden');
                        darkIcon.classList.remove('hidden');
                    } else {
                        lightIcon.classList.remove('hidden');
                        darkIcon.classList.add('hidden');
                    }
                }
            }

            function updateMenuActiveState(themeName) {
                document.querySelectorAll('#theme-menu .dropdown-item').forEach(function(item) {
                    var isActive = item.dataset.theme === themeName;
                    item.style.backgroundColor = isActive ? 'oklch(var(--p) / 0.1)' : '';
                    var check = item.querySelector('.active-check');
                    if (check) check.style.display = isActive ? '' : 'none';
                });
            }

                        </div>
                    </div>
                    <footer class="footer" style="margin-top:2rem;">
                        <div>
                            <p class="text-sm">Powered by <strong>Zynsync</strong><br>-----------------友情链接🔗</p>
                        </div>
                        <div class="flex gap-2 items-center">
                            <a href="https://yast-code426.github.io/-" target="_blank" class="btn-icon" style="width:2rem;height:2rem;padding:0;">
                                <img src="https://i.ibb.co/nsF868SL/Image-1777641761766-450.jpg" alt="友情链接" class="friend-link-img">
                            </a>
                        </div>
                    </footer>
                `;
            }

            function showPostContent(postId) {
                const post = postsData.find(p => p.id === postId);
                if (!post || !mainContent) return;
                mainContent.innerHTML = `
                    <div class="post-detail-container">
                        <button id="back-to-home" class="btn btn-ghost mb-4" style="display:flex; align-items:center; gap:0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            返回主页
                        </button>
                        <article class="card" style="padding:2rem;">
                            <h1 style="font-size:2.25rem; font-weight:700; margin-bottom:1rem; background:linear-gradient(to right, oklch(var(--p)), oklch(var(--s))); -webkit-background-clip:text; -webkit-text-fill-color:transparent; word-break:break-word;">${post.title}</h1>
                            <div style="display:flex; gap:1rem; margin-bottom:1.5rem; color:oklch(var(--bc)/0.6); font-size:0.9rem;">
                                <span>📅 ${post.date}</span>
                                <span>📖 ${post.wordCount}</span>
                            </div>
                            <div style="line-height:1.8; font-size:1.1rem; color:oklch(var(--bc)/0.9); word-wrap:break-word; overflow-wrap:break-word;">
                                ${post.content}
                            </div>
                        </article>
                    </div>
                `;
                document.getElementById('back-to-home').addEventListener('click', renderHomePage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function attachPostClickEvents() {
                document.querySelectorAll('.post-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        const postId = this.dataset.postId;
                        if (postId) {
                            showPostContent(postId);
                        }
                    });
                });
            }

            function startStatsSimulation() {
                setInterval(() => {
                    const pv = document.getElementById('site-pv');
                    const uv = document.getElementById('site-uv');
                    if (pv) pv.innerText = Math.floor(Math.random() * 1000);
                    if (uv) uv.innerText = Math.floor(Math.random() * 500);
                }, 5000);
            }

            document.getElementById('nav-home-logo').addEventListener('click', (e) => {
                e.preventDefault();
                renderHomePage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('nav-home').addEventListener('click', (e) => {
                e.preventDefault();
                renderHomePage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('nav-projects').addEventListener('click', (e) => {
                e.preventDefault();
                renderProjectsPage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('mobile-home').addEventListener('click', (e) => {
                e.preventDefault();
                renderHomePage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('mobile-projects').addEventListener('click', (e) => {
                e.preventDefault();
                renderProjectsPage();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            function escapeHtml(str) {
                var div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function highlightText(text, keyword) {
                if (!keyword) return escapeHtml(text);
                var escaped = escapeHtml(text);
                var escapedKw = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var regex = new RegExp('(' + escapedKw + ')', 'gi');
                return escaped.replace(regex, '<span class="search-highlight">$1</span>');
            }

            function stripHtml(html) {
                var tmp = document.createElement('div');
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || '';
            }

            function searchPosts(keyword) {
                if (!keyword || !keyword.trim()) return [];
                var kw = keyword.trim().toLowerCase();
                return postsData.filter(function(post) {
                    var fields = [post.title, post.category, post.description, stripHtml(post.content)].concat(post.tags);
                    return fields.some(function(f) { return f && f.toLowerCase().indexOf(kw) !== -1; });
                });
            }

            function getContextText(text, keyword, len) {
                if (!keyword || !text) return text || '';
                var lower = text.toLowerCase();
                var kw = keyword.toLowerCase();
                var idx = lower.indexOf(kw);
                if (idx === -1) return text.substring(0, len) + (text.length > len ? '...' : '');
                var start = Math.max(0, idx - Math.floor(len / 2));
                var end = Math.min(text.length, start + len);
                var result = '';
                if (start > 0) result += '...';
                result += text.substring(start, end);
                if (end < text.length) result += '...';
                return result;
            }

            var searchModal = document.getElementById('search-modal');
            var searchModalInput = document.getElementById('search-modal-input');
            var searchModalResults = document.getElementById('search-modal-results');
            var searchActiveIndex = -1;

            function openSearchModal(initialQuery) {
                if (!searchModal) return;
                searchModal.classList.add('active');
                if (searchModalInput) {
                    searchModalInput.value = initialQuery || '';
                    searchModalInput.focus();
                    if (initialQuery) updateSearchModalResults(initialQuery);
                }
                searchActiveIndex = -1;
            }

            function closeSearchModal() {
                if (!searchModal) return;
                searchModal.classList.remove('active');
                searchActiveIndex = -1;
            }

            function updateSearchModalResults(keyword) {
                if (!searchModalResults) return;
                if (!keyword || !keyword.trim()) {
                    searchModalResults.innerHTML = '<div class="search-modal-empty">输入关键词开始搜索</div>';
                    searchActiveIndex = -1;
                    return;
                }
                var results = searchPosts(keyword);
                if (results.length === 0) {
                    searchModalResults.innerHTML = '<div class="search-modal-empty">没有找到相关文章 😢</div>';
                    searchActiveIndex = -1;
                    return;
                }
                searchModalResults.innerHTML = results.map(function(post, i) {
                    return '<div class="search-modal-item" data-post-id="' + post.id + '" data-index="' + i + '">' +
                        '<div class="search-modal-item-icon"><img src="' + post.image + '" alt="" loading="lazy"></div>' +
                        '<div class="search-modal-item-info">' +
                        '<div class="search-modal-item-title">' + highlightText(post.title, keyword) + '</div>' +
                        '<div class="search-modal-item-meta">📅 ' + post.date + ' · ' + post.category + '</div>' +
                        '</div></div>';
                }).join('');
                searchActiveIndex = -1;

                searchModalResults.querySelectorAll('.search-modal-item').forEach(function(item) {
                    item.addEventListener('click', function() {
                        var postId = this.dataset.postId;
                        closeSearchModal();
                        showPostContent(postId);
                    });
                });
            }

            function navigateSearchResults(direction) {
                var items = searchModalResults.querySelectorAll('.search-modal-item');
                if (items.length === 0) return;
                items.forEach(function(item) { item.style.backgroundColor = ''; });
                if (direction === 'down') {
                    searchActiveIndex = (searchActiveIndex + 1) % items.length;
                } else {
                    searchActiveIndex = searchActiveIndex <= 0 ? items.length - 1 : searchActiveIndex - 1;
                }
                var activeItem = items[searchActiveIndex];
                if (activeItem) {
                    activeItem.style.backgroundColor = 'oklch(var(--b2))';
                    activeItem.scrollIntoView({ block: 'nearest' });
                }
            }

            function activateSearchResult() {
                var items = searchModalResults.querySelectorAll('.search-modal-item');
                if (searchActiveIndex >= 0 && searchActiveIndex < items.length) {
                    items[searchActiveIndex].click();
                }
            }

            if (searchModal) {
                searchModal.addEventListener('click', function(e) {
                    if (e.target === searchModal) closeSearchModal();
                });
            }

            if (searchModalInput) {
                var searchDebounceTimer = null;
                searchModalInput.addEventListener('input', function() {
                    clearTimeout(searchDebounceTimer);
                    var val = this.value;
                    searchDebounceTimer = setTimeout(function() {
                        updateSearchModalResults(val);
                    }, 200);
                });
                searchModalInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        closeSearchModal();
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        navigateSearchResults('down');
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        navigateSearchResults('up');
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        activateSearchResult();
                    }
                });
            }

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    if (searchModal && searchModal.classList.contains('active')) {
                        closeSearchModal();
                    } else {
                        openSearchModal();
                    }
                }
                if (e.key === 'Escape' && searchModal && searchModal.classList.contains('active')) {
                    closeSearchModal();
                }
            });

            function renderSearchPage(keyword) {
                if (!mainContent) return;
                var results = searchPosts(keyword);
                var resultsHTML = '';
                if (results.length === 0) {
                    resultsHTML = '<div class="search-empty">' +
                        '<div class="search-empty-icon">🔍</div>' +
                        '<div class="search-empty-title">未找到结果</div>' +
                        '<div class="search-empty-desc">没有找到与 "' + escapeHtml(keyword) + '" 相关的文章，试试其他关键词？</div>' +
                        '</div>';
                } else {
                    resultsHTML = results.map(function(post) {
                        var plainContent = stripHtml(post.content);
                        var context = getContextText(plainContent, keyword, 80);
                        return '<div class="card search-result-card" data-post-id="' + post.id + '" style="margin-top:1rem;overflow:hidden;">' +
                            '<div class="post-image"><img src="' + post.image + '" alt="' + escapeHtml(post.title) + '" loading="lazy"></div>' +
                            '<div class="post-body">' +
                            '<div>' +
                            '<h2 class="post-title" style="font-size:1.25rem;">' + highlightText(post.title, keyword) + '</h2>' +
                            '<div class="post-meta"><span>📅 ' + post.date + '</span><span>📖 ' + post.wordCount + '</span></div>' +
                            '<p class="search-match-context">' + highlightText(context, keyword) + '</p>' +
                            '</div>' +
                            '<div class="tags">' +
                            '<a href="#" class="tag category-tag">' + highlightText(post.category, keyword) + '</a>' +
                            post.tags.map(function(tag) { return '<a href="#" class="tag">' + highlightText(tag, keyword) + '</a>'; }).join('') +
                            '</div></div></div>';
                    }).join('');
                }

                mainContent.innerHTML = '<div style="max-width:48rem;margin:0 auto;width:100%;">' +
                    '<div class="search-page-header">' +
                    '<button id="back-to-home-search" class="btn btn-ghost mb-4" style="display:flex;align-items:center;gap:0.5rem;">' +
                    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回主页</button>' +
                    '<div class="search-page-input-wrap">' +
                    '<svg class="search-page-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/></svg>' +
                    '<input type="text" class="search-page-input" id="search-page-input" value="' + escapeHtml(keyword) + '" placeholder="搜索文章标题、分类、标签...">' +
                    '</div>' +
                    '<div class="search-stats">找到 ' + results.length + ' 篇与 "' + escapeHtml(keyword) + '" 相关的文章</div>' +
                    '</div>' +
                    resultsHTML +
                    '</div>';

                document.getElementById('back-to-home-search').addEventListener('click', renderHomePage);

                var pageInput = document.getElementById('search-page-input');
                if (pageInput) {
                    pageInput.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' && this.value.trim()) {
                            renderSearchPage(this.value.trim());
                        }
                    });
                    pageInput.focus();
                    pageInput.setSelectionRange(keyword.length, keyword.length);
                }

                mainContent.querySelectorAll('.search-result-card').forEach(function(card) {
                    card.addEventListener('click', function() {
                        var postId = this.dataset.postId;
                        if (postId) showPostContent(postId);
                    });
                });

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            renderHomePage();
        })();
    </script>
</body>
</html>
